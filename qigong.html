<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qigong - Jacob Cole</title>
    <style>
        :root {
            --bg-start: #f5f7fa;
            --bg-end: #e4e8ec;
            --text: #333;
            --heading: #111;
            --tagline: #888;
            --link-color: #2563eb;
            --link-hover: #1d4ed8;
            --card-bg: #fff;
            --card-shadow: rgba(0, 0, 0, 0.08);
            --card-border: rgba(0, 0, 0, 0.06);
            --section-title: #999;
            --back-link: #aaa;
            --back-link-hover: #666;
            --desc: #888;
            --inline-link: #aaa;
            --inline-link-hover: #666;
            --separator: #ccc;
        }

        [data-theme="dark"] {
            --bg-start: #24272c;
            --bg-end: #2e3238;
            --text: #c8c8c8;
            --heading: #e8e8e8;
            --tagline: #8a8a8a;
            --link-color: #60a5fa;
            --link-hover: #93bbfd;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.2);
            --card-border: rgba(255, 255, 255, 0.08);
            --section-title: #6a6a6a;
            --back-link: #707070;
            --back-link-hover: #a0a0a0;
            --desc: #808080;
            --inline-link: #707070;
            --inline-link-hover: #a0a0a0;
            --separator: #505050;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 3rem 2rem;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 550px; margin: 0 auto; }

        .back {
            display: inline-block;
            color: var(--back-link);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }
        .back:hover { color: var(--back-link-hover); }

        h1 { font-size: 1.75rem; font-weight: 700; color: var(--heading); margin-bottom: 0.5rem; }
        .subtitle { color: var(--tagline); font-size: 0.85rem; margin-bottom: 2.5rem; line-height: 1.5; }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--section-title);
            margin-bottom: 0.75rem;
            padding-left: 0.25rem;
        }

        .section { margin-bottom: 2rem; }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text);
            text-decoration: none;
            padding: 1rem 1.25rem;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 1px 3px var(--card-shadow);
            border: 1px solid var(--card-border);
            transition: all 0.2s ease;
        }

        a.card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--card-shadow);
        }

        .card .icon {
            font-size: 1.25rem;
            width: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }

        .card .content { flex: 1; min-width: 0; }

        .card .label { font-weight: 500; color: var(--heading); }

        .card .desc {
            font-size: 0.8rem;
            color: var(--desc);
            margin-top: 0.2rem;
            line-height: 1.4;
        }

        .theme-toggle {
            position: fixed; top: 1.25rem; right: 1.25rem;
            background: none; border: none; font-size: 0.85rem;
            cursor: pointer; opacity: 0.3; transition: opacity 0.2s;
            padding: 0.25rem; line-height: 1;
        }
        .theme-toggle:hover { opacity: 0.65; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>

    <div class="container">
        <a href="index.html" class="back">&larr; Home</a>

        <h1>Qigong</h1>
        <p class="subtitle">Practice videos, resources, and the full Qigong.Garden guide.</p>

        <div class="section">
            <h2 class="section-title">Videos</h2>
            <nav class="cards">
                <a class="card" href="https://www.youtube.com/watch?v=9z4sTHRHxj4" target="_blank" rel="noopener">
                    <span class="icon">🧘</span>
                    <div class="content">
                        <div class="label">Joe Qigong 50 min</div>
                        <div class="desc">Full practice session</div>
                    </div>
                </a>
                <a class="card" href="https://www.youtube.com/watch?v=TTn-5Vu1SEw" target="_blank" rel="noopener">
                    <span class="icon">🌿</span>
                    <div class="content">
                        <div class="label">Donna Eden Daily Energy Routine</div>
                        <div class="desc">Jacob & Sodi, 23 min</div>
                    </div>
                </a>
            </nav>
        </div>

        <div class="section">
            <h2 class="section-title">Resources</h2>
            <nav class="cards">
                <a class="card" href="https://qigong.garden" target="_blank" rel="noopener">
                    <span class="icon">🌳</span>
                    <div class="content">
                        <div class="label">Qigong.Garden</div>
                        <div class="desc">Full guide &mdash; videos, books, external resources & more</div>
                    </div>
                </a>
            </nav>
        </div>
    </div>

    <script>
        (function() {
            var btn = document.getElementById('theme-toggle');
            var root = document.documentElement;
            function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
            function applyTheme() {
                var saved = localStorage.getItem('theme');
                root.setAttribute('data-theme', saved || getSystemTheme());
                btn.textContent = root.getAttribute('data-theme') === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
            }
            btn.addEventListener('click', function() {
                var systemTheme = getSystemTheme();
                if (!localStorage.getItem('theme')) localStorage.setItem('theme', systemTheme === 'dark' ? 'light' : 'dark');
                else if (localStorage.getItem('theme') !== systemTheme) localStorage.removeItem('theme');
                else localStorage.setItem('theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
                applyTheme();
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() { if (!localStorage.getItem('theme')) applyTheme(); });
            applyTheme();
        })();
    </script>
</body>
</html>
